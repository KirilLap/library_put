<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Путеводитель по зданию</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #f0f4f8;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 { color: #2c3e50; margin-bottom: 10px; }

    .map-wrapper {
      width: 100%;
      max-width: 1400px;
      background: white;
      padding: 15px;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    /* Стили для комнат (ваши серые фигуры) */
    .room {
      fill: #e3f2fd; /* Меняем дефолтный серый на приятный голубой */
      stroke: #aecbfa;
      stroke-width: 2px;
      opacity: 0.6; /* Делаем чуть заметнее */
      cursor: pointer;
      transition: all 0.25s ease;
    }

    /* Эффект наведения на комнату */
    .room:hover {
      fill: #1a73e8;
      opacity: 0.9;
      filter: drop-shadow(0 4px 12px rgba(26,115,232,0.4));
    }

    /* Активное/выбранное помещение */
    .room.selected {
      fill: #34a853 !important;
      opacity: 1;
    }

    /* Стили для названий кабинетов */
    .room-label {
      font-size: 32px; /* Координаты SVG огромные (3614px), поэтому шрифт крупный */
      font-weight: 700;
      fill: #1967d2;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none; /* Чтобы текст не мешал кликать по комнате */
      transition: fill 0.25s;
    }
    
    /* Цвет текста, когда мы навели на комнату */
    .room:hover + .room-label, 
    .room.selected + .room-label {
      fill: white;
    }

    /* Информационная панель внизу */
    #info-panel {
      margin-top: 20px;
      padding: 15px 30px;
      background: #2c3e50;
      color: white;
      border-radius: 8px;
      font-size: 18px;
      min-width: 300px;
      text-align: center;
    }
  </style>
</head>

    <!-- Ваш SVG с добавленными классами "room" и уникальными id -->

    </svg>
  </div>

  <div id="info-panel">Кликните на любую комнату на карте</div>

  <script>
    const infoPanel = document.getElementById('info-panel');
    const rooms = document.querySelectorAll('.room');

    rooms.forEach(room => {
      // 1. АВТОМАТИЧЕСКИЙ РАСЧЕТ ЦЕНТРА И ДОБАВЛЕНИЕ ТЕКСТА
      const bbox = room.getBBox();
      const centerX = bbox.x + bbox.width / 2;
      const centerY = bbox.y + bbox.height / 2;

      // Создаем SVG элемент для текста
      const textNode = document.createElementNS("http://www.w3.org/2000/svg", "text");
      textNode.setAttribute("x", centerX);
      textNode.setAttribute("y", centerY);
      textNode.setAttribute("class", "room-label");
      
      // Берем имя из data-name, если его нет — пишем ID
      textNode.textContent = room.getAttribute('data-name') || room.id;

      // Вставляем текст в SVG сразу после текущей комнаты
      room.parentNode.insertBefore(textNode, room.nextSibling);

      // 2. ОБРАБОТКА КЛИКОВ
      room.addEventListener('click', function() {
        // Снимаем выделение с других комнат
        rooms.forEach(r => r.classList.remove('selected'));
        
        // Выделяем текущую
        this.classList.add('selected');
        
        // Выводим инфо
        const roomName = this.getAttribute('data-name');
        infoPanel.innerHTML = `Вы выбрали: <strong>${roomName}</strong> (ID: ${this.id})`;
      });
    });
  </script>
</body>
</html>
