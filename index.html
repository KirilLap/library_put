<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Путеводитель по зданию — 1 этаж</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EEF1EC;
    --paper-panel:#E3E8E2;
    --ink:#132029;
    --ink-soft:#57666D;
    --blueprint:#1D4E66;
    --blueprint-dark:#0F2E3D;
    --room-fill:#C9DDE6;
    --room-stroke:#8FB4C4;
    --selected:#2E7D5B;
    --selected-soft:#DCEEE4;
    --route:#C23B22;
    --radius:16px;
    --font-display:'JetBrains Mono', ui-monospace, monospace;
    --font-body:'Inter', system-ui, -apple-system, sans-serif;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--paper); color:var(--ink);
    font-family:var(--font-body);
    overscroll-behavior:none;
  }
  body{ display:flex; flex-direction:column; }

  /* ---------- Шапка в стиле чертёжного штампа ---------- */
  header{
    background:
      repeating-linear-gradient(0deg, rgba(29,78,102,.08) 0 1px, transparent 1px 24px),
      repeating-linear-gradient(90deg, rgba(29,78,102,.08) 0 1px, transparent 1px 24px),
      var(--blueprint-dark);
    color:#EAF2F5;
    padding:14px 16px 12px;
    border-bottom:3px solid var(--route);
  }
  header .eyebrow{
    font-family:var(--font-display);
    font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    color:#8FC1D6; margin:0 0 2px;
  }
  header h1{
    margin:0; font-size:clamp(18px,5vw,24px); font-weight:700; line-height:1.2;
  }
  header .meta{
    font-family:var(--font-display); font-size:10.5px; letter-spacing:.06em;
    color:#6E97A6; margin-top:6px;
  }

  /* ---------- Переключатель Карта/Список ---------- */
  .view-toggle{
    display:flex; gap:6px; padding:10px 12px; background:var(--paper);
    border-bottom:1px solid #D5DAD1; position:sticky; top:0; z-index:5;
  }
  .view-toggle button{
    flex:1; padding:10px 8px; border-radius:10px; border:1.5px solid var(--blueprint);
    background:#fff; color:var(--blueprint); font-family:var(--font-body); font-weight:600;
    font-size:14px; cursor:pointer; min-height:44px;
  }
  .view-toggle button.active{ background:var(--blueprint); color:#fff; }

  /* ---------- Поиск (в режиме списка) ---------- */
  .search-wrap{ padding:10px 12px 0; background:var(--paper); }
  .search-wrap input{
    width:100%; padding:12px 14px; border-radius:10px; border:1.5px solid #C7CFC4;
    font-family:var(--font-body); font-size:15px; background:#fff; color:var(--ink);
  }
  .search-wrap input:focus{ outline:2px solid var(--blueprint); outline-offset:1px; }

  main{ flex:1; position:relative; overflow:hidden; display:flex; flex-direction:column; min-height:0; }

  /* ---------- Карта ---------- */
  #map-view{ flex:1; position:relative; min-height:0; display:none; }
  #map-view.active{ display:flex; }
  .map-canvas{
    flex:1; position:relative; overflow:hidden; background:var(--paper);
    touch-action:none;
    user-select:none;
    -webkit-user-select:none;
    -ms-user-select:none;
    cursor:grab;
  }
  .map-canvas.dragging{ cursor:grabbing; }
  .map-canvas, .map-canvas *, .map-transform, .map-transform *{
    user-select:none;
    -webkit-user-select:none;
    -ms-user-select:none;
  }
  .map-transform{
    position:absolute; inset:0; transform-origin:0 0; will-change:transform;
    width:100%; height:100%;
  }
  .map-transform svg{ display:block; width:100%; height:100%; max-width:none; }

  .room{ fill:var(--room-fill); stroke:var(--room-stroke); stroke-width:2px; opacity:.85; cursor:pointer; transition:fill .2s, opacity .2s; }
  .room:hover{ fill:#AFCEDD; }
  .room.selected{ fill:var(--selected); opacity:1; stroke:var(--selected); }
  .room-label{
    font-family:var(--font-display); font-size:30px; font-weight:700;
    fill:var(--blueprint); text-anchor:middle; dominant-baseline:middle; pointer-events:none;
    text-rendering:geometricPrecision; shape-rendering:geometricPrecision;
  }
  .room.selected + .room-label{ fill:#fff; }
  .entrance-label{
    font-family:var(--font-display); font-weight:700; font-size:26px; fill:var(--route);
    text-rendering:geometricPrecision; shape-rendering:geometricPrecision;
  }
  .entrance-pin circle{ fill:var(--route); stroke:#fff; stroke-width:4px; }
  .entrance-label{ font-family:var(--font-display); font-weight:700; font-size:26px; fill:var(--route); }
  #route-path{
    fill:none; stroke:var(--route); stroke-width:8px; stroke-linecap:round; stroke-linejoin:round;
    stroke-dasharray:2 22; opacity:0; transition:opacity .25s;
  }
  #route-end{
    fill:#FFB000; stroke:#fff; stroke-width:4px; opacity:0; transition:opacity .25s;
  }
  #route-end.visible{ opacity:1; }
  #route-path.visible{ opacity:1; animation:march 1.1s linear infinite; }
  @media (prefers-reduced-motion: reduce){ #route-path.visible{ animation:none; } }
  @keyframes march{ to{ stroke-dashoffset:-48; } }

  .map-controls{
    position:absolute; right:12px; bottom:12px; display:flex; flex-direction:column; gap:8px; z-index:4;
  }
  .map-controls button{
    width:44px; height:44px; border-radius:10px; border:1.5px solid var(--blueprint);
    background:#fff; color:var(--blueprint); font-size:20px; font-weight:700; cursor:pointer;
  }

  /* ---------- Список ---------- */
  #list-view{ flex:1; overflow-y:auto; display:none; padding:10px 12px 24px; -webkit-overflow-scrolling:touch; }
  #list-view.active{ display:block; }
  .room-card{
    display:flex; align-items:center; gap:12px; background:#fff; border:1.5px solid #DCE1D8;
    border-radius:12px; padding:12px; margin-bottom:8px; cursor:pointer;
  }
  .room-card:active{ background:var(--selected-soft); }
  .room-card .badge{
    width:18px; height:18px; min-width:18px;
    background:var(--blueprint); border-radius:50%;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .room-card .txt strong{ display:block; font-size:15px; }
  .room-card .txt span{ display:block; font-size:12.5px; color:var(--ink-soft); margin-top:2px; }
  .empty-state{ text-align:center; color:var(--ink-soft); padding:32px 12px; font-size:14px; }

  /* ---------- Нижняя панель с информацией ---------- */
  #info-sheet{
    position:fixed; left:0; right:0; bottom:0; background:#fff; z-index:20;
    border-radius:18px 18px 0 0; box-shadow:0 -8px 30px rgba(0,0,0,.18);
    transform:translateY(100%); transition:transform .28s ease;
    max-height:72vh; display:flex; flex-direction:column; overflow:hidden;
    padding-bottom:calc(14px + env(safe-area-inset-bottom));
  }
  #info-sheet.open{ transform:translateY(0); }
  .sheet-handle{ width:40px; height:4px; background:#D6DBD1; border-radius:4px; margin:10px auto 4px; }
  .sheet-head{ display:flex; align-items:flex-start; gap:12px; padding:6px 16px 8px; }
  .sheet-head .badge{
    font-family:var(--font-display); font-weight:700; font-size:16px; color:#fff;
    background:var(--blueprint); border-radius:9px; min-width:48px; height:48px;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .sheet-head h2{ margin:0; font-size:17px; line-height:1.3; flex:1; }
  .sheet-close{ background:none; border:none; font-size:20px; color:var(--ink-soft); cursor:pointer; padding:6px; min-width:32px; }
  .sheet-body{ overflow-y:auto; padding:0 16px 6px; }
  .sheet-section{ margin-bottom:14px; }
  .sheet-section h3{
    font-family:var(--font-display); font-size:11px; letter-spacing:.08em; text-transform:uppercase;
    color:var(--ink-soft); margin:0 0 4px;
  }
  .sheet-section p{ margin:0; font-size:14.5px; line-height:1.5; color:var(--ink); }
  .sheet-route{ display:flex; gap:10px; align-items:flex-start; }
  .sheet-route .dot{ width:10px; height:10px; border-radius:50%; background:var(--route); margin-top:5px; flex-shrink:0; }
  .sheet-desc p{ margin:0 0 8px; font-size:14.5px; line-height:1.5; color:var(--ink); }
  .sheet-desc p:last-child{ margin-bottom:0; }
  .sheet-gallery{
    display:flex; gap:8px; overflow-x:auto; padding:2px 2px 4px; margin-bottom:14px;
    scroll-snap-type:x proximity; -webkit-overflow-scrolling:touch;
  }
  .sheet-gallery img{
    height:120px; width:auto; border-radius:10px; object-fit:cover; flex-shrink:0;
    scroll-snap-align:start; cursor:pointer; background:var(--paper-panel);
  }
  .sheet-note{
    display:flex; gap:10px; align-items:flex-start; background:#FBEFE9;
    border:1px solid #EBC3AF; border-left:4px solid var(--route);
    border-radius:10px; padding:10px 12px; margin-bottom:4px;
  }
  .sheet-note .icon{ font-size:16px; line-height:1.4; flex-shrink:0; }
  .sheet-note p{ margin:0; font-size:13.5px; line-height:1.45; color:#7A3B21; }
  #lightbox{
    position:fixed; inset:0; background:rgba(10,20,25,.92); z-index:40;
    display:none; align-items:center; justify-content:center; padding:20px;
  }
  #lightbox.open{ display:flex; }
  #lightbox img{ max-width:100%; max-height:88vh; border-radius:8px; }
  #lightbox .lb-close{
    position:absolute; top:16px; right:16px; width:40px; height:40px; border-radius:50%;
    background:rgba(255,255,255,.15); color:#fff; border:none; font-size:18px; cursor:pointer;
  }
  .sheet-actions{ display:flex; gap:8px; padding:4px 16px 4px; }
  .sheet-actions button{
    flex:1; padding:11px; border-radius:10px; border:1.5px solid var(--blueprint);
    background:#fff; color:var(--blueprint); font-family:var(--font-body); font-weight:600; font-size:13.5px;
  }
  .sheet-actions button.primary{ background:var(--route); border-color:var(--route); color:#fff; }
  #overlay{ display:none; }
</style>
</head>
<body>

<header>
  <p class="eyebrow">Библиотека · навигация</p>
  <h1>Путеводитель по зданию</h1>
</header>

</div>

<div class="search-wrap" id="search-wrap" style="display:none;">
  <input id="search-input" type="search" placeholder="Найти кабинет по номеру или названию…" oninput="renderList()">
</div>

        </svg>
      </div>
    </div>
    <div class="map-controls">
      <button onclick="zoomBy(1.35)" aria-label="Приблизить">+</button>
      <button onclick="zoomBy(1/1.35)" aria-label="Отдалить">–</button>
      <button onclick="resetView()" aria-label="Сбросить масштаб">⤾</button>

  <div id="list-view"></div>
</main>

<div id="overlay" onclick="closeSheet()"></div>
<div id="info-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-head">
    
    <h2 id="sheet-title">Кабинет</h2>
    <button class="sheet-close" onclick="closeSheet()" aria-label="Закрыть">✕</button>
  </div>
  <div class="sheet-body">
    <div class="sheet-section">
      <h3>Как пройти от входа</h3>
      <div class="sheet-route"><span class="dot"></span><p id="sheet-route">—</p></div>
    </div>
    <div class="sheet-section" id="sheet-gallery-wrap" style="display:none;">
      <div class="sheet-gallery" id="sheet-gallery"></div>
    </div>
    <div class="sheet-section">
      <h3>Описание</h3>
      <div class="sheet-desc" id="sheet-desc">—</div>
    </div>
    <div class="sheet-section" id="sheet-note-wrap" style="display:none;">
      <div class="sheet-note"><span class="icon">⚠️</span><p id="sheet-note">—</p></div>
    </div>
  </div>
  <div class="sheet-actions" id="sheet-actions">
    <button class="primary" id="btn-show-on-map" onclick="focusRoomOnMap(currentRoomId)">Показать на карте</button>
  </div>

  <button class="lb-close" onclick="closeLightbox()" aria-label="Закрыть">✕</button>
  <img id="lightbox-img" src="" alt="">

<script src="room-labels.js"></script>
<script src="room-routes.js"></script>
<script src="room-data.js"></script>
<script src="room-details.js"></script>
<script>
/* ======================================================================
   Основной скрипт библиотеки
   ====================================================================== */
const roomEls = {};
const centers = {};

// --- построение подписей (номер + название) и запоминание центров комнат ---
document.querySelectorAll('.room').forEach(el=>{
  const id = el.id;
  roomEls[id] = el;
  const bbox = el.getBBox();
  const cx = bbox.x + bbox.width/2, cy = bbox.y + bbox.height/2;
  centers[id] = {x:cx, y:cy};

  const num = id.replace('room-','');
  const d = ROOM_DATA[id] || {};
  // короткое имя без плейсхолдера "[название]", если оно ещё не заполнено
  const cleanName = (d.name || '').replace(/\s*—\s*\[название\]\s*$/,'').trim();
  const text = cleanName ? `${num} · ${cleanName}` : num;

  // Узкие кабинеты (выше, чем шире) — подпись поворачиваем на 90°, чтобы влезла
  const rotate = bbox.height > bbox.width * 1.15;
  const available = (rotate ? bbox.height : bbox.width) - 30; // отступы по краям

  let fontSize = 30;
  const estWidth = text.length * fontSize * 0.56;
  if(estWidth > available){
    fontSize = Math.max(13, Math.floor(available / (text.length * 0.56)));
  }

  const label = document.createElementNS("http://www.w3.org/2000/svg","text");
  label.setAttribute("x", cx); label.setAttribute("y", cy);
  label.setAttribute("class","room-label");
  label.setAttribute("font-size", fontSize);
  if(rotate) label.setAttribute("transform", `rotate(-90 ${cx} ${cy})`);
  // Поддержка опциональной конфигурации подписи: комбинируем ROOM_DATA[id].label и window.ROOM_LABELS[id]
  // Пример поля label/ROOM_LABELS: { lines:['Сектор','Единого абонемента'], x:1600, y:850, rotate:-90, fontSize:22, lineHeight:26, anchor:'middle', dx:10, dy:-6 }
  const cfg = Object.assign({}, d.label || {}, (window.ROOM_LABELS && window.ROOM_LABELS[id]) ? window.ROOM_LABELS[id] : {});
  if(cfg && cfg.fontSize) fontSize = cfg.fontSize;

  let lines = [];
  if(cfg && Array.isArray(cfg.lines) && cfg.lines.length){
    lines = cfg.lines.slice();
  } else if(cleanName){
    // разделяем название на 1-2 строки (как раньше)
    const nameWords = cleanName.split(/\s+/);
    if(nameWords.length <= 2){
      lines = [cleanName];
    } else {
      let total = nameWords.reduce((s,w,i)=> s + w.length + (i>0?1:0), 0);
      const cum = []; let acc = 0;
      for(let i=0;i<nameWords.length;i++){ acc += nameWords[i].length + (i>0?1:0); cum.push(acc); }
      const half = Math.floor(total/2);
      let splitAt = 1, minDiff = Infinity;
      for(let i=0;i<cum.length-1;i++){ const diff = Math.abs(cum[i] - half); if(diff < minDiff){ minDiff = diff; splitAt = i+1; } }
      const first = nameWords.slice(0, splitAt).join(' ');
      const second = nameWords.slice(splitAt).join(' ');
      lines = [first, second];
    }
  } else {
    // авторазбивка по ширине
    const words = text.split(/\s+/);
    lines = []; let cur = '';
    const charWidth = fontSize * 0.56;
    words.forEach(w=>{
      const test = cur ? (cur + ' ' + w) : w;
      const estWidth = test.length * charWidth;
      if(estWidth > available && cur){ lines.push(cur); cur = w; } else { cur = test; }
    });
    if(cur) lines.push(cur);
  }

  // lineHeight: можно переопределить из конфига
  const lineHeight = (cfg && cfg.lineHeight) ? cfg.lineHeight : Math.max(16, Math.round(fontSize * 1.5));
  // позиция: абсолютная (cfg.x/cfg.y) или относительная смещённая (cfg.dx/cfg.dy)
  let customPos = null;
  if(cfg && (cfg.x !== undefined || cfg.y !== undefined)){
    customPos = { x: cfg.x !== undefined ? cfg.x : cx, y: cfg.y !== undefined ? cfg.y : cy };
  } else if(cfg && (cfg.dx !== undefined || cfg.dy !== undefined)){
    customPos = { x: cx + (cfg.dx || 0), y: cy + (cfg.dy || 0) };
  }
  // выравнивание
  if(cfg && cfg.anchor) label.setAttribute('text-anchor', cfg.anchor);
  // поворот
  if(cfg && cfg.rotate !== undefined){
    const rx = (cfg && cfg.rotateOriginX !== undefined) ? cfg.rotateOriginX : (customPos ? customPos.x : cx);
    const ry = (cfg && cfg.rotateOriginY !== undefined) ? cfg.rotateOriginY : (customPos ? customPos.y : cy);
    label.setAttribute('transform', `rotate(${cfg.rotate} ${rx} ${ry})`);
  }
  // поддержка цвета: сначала ищем в конфиге label.color, затем в ROOM_COLORS
  let color = (cfg && cfg.color) ? cfg.color : (window.ROOM_COLORS && window.ROOM_COLORS[id]) ? window.ROOM_COLORS[id] : (window.__ROOM_COLORS && window.__ROOM_COLORS[id]) ? window.__ROOM_COLORS[id] : null;
  if(color){
    try{ el.setAttribute('fill', color); }catch(e){}
    try{ el.style.setProperty('--selected', color); }catch(e){}
    label.setAttribute('fill', color);
  }
  // создание tspan'ов
  const yStartFinal = customPos ? customPos.y : (cy - ((lines.length - 1) / 2) * lineHeight);
  lines.forEach((ln, i)=>{
    const tspan = document.createElementNS("http://www.w3.org/2000/svg","tspan");
    const tx = customPos ? customPos.x : cx;
    const ty = yStartFinal + i * lineHeight;
    tspan.setAttribute('x', tx);
    tspan.setAttribute('y', ty);
    tspan.textContent = ln;
    label.appendChild(tspan);
  });
  el.parentNode.insertBefore(label, el.nextSibling);
  // клик обрабатывается централизованно в логике pan/zoom ниже (см. handleTap),
  // чтобы не конфликтовать с pointer capture при перетаскивании карты
});

// --- маркер входа ---
(function addEntrance(){
  const g = document.getElementById('mapGroup');
  const pin = document.createElementNS("http://www.w3.org/2000/svg","g");
  pin.setAttribute("class","entrance-pin");
  pin.innerHTML = `<circle cx="${ENTRANCE.x}" cy="${ENTRANCE.y}" r="20"/>`;
  const lbl = document.createElementNS("http://www.w3.org/2000/svg","text");
  lbl.setAttribute("x", ENTRANCE.x); lbl.setAttribute("y", ENTRANCE.y - 30);
  lbl.setAttribute("class","entrance-label"); lbl.setAttribute("text-anchor","middle");
  lbl.textContent = "Вход";
  g.appendChild(pin); g.appendChild(lbl);
})();

/* ---------------- выбор кабинета / нижняя панель ---------------- */
function showRoomInfo(id, withRoute){
  currentRoomId = id;
  Object.values(roomEls).forEach(el=>el.classList.remove('selected'));
  roomEls[id].classList.add('selected');
  // Берём базовые данные из ROOM_DATA и дополняем/переопределяем из ROOM_DETAILS
  const d = Object.assign({}, ROOM_DATA[id] || {}, (window.ROOM_DETAILS && window.ROOM_DETAILS[id]) || {});
  
  document.getElementById('sheet-title').textContent = d.name || id;
  document.getElementById('sheet-route').textContent = d.route || '—';

  // Описание — массив абзацев
  const descEl = document.getElementById('sheet-desc');
  const paragraphs = Array.isArray(d.desc) ? d.desc : (d.desc ? [d.desc] : []);
  descEl.innerHTML = paragraphs.length
    ? paragraphs.map(p=>`<p>${p}</p>`).join('')
    : '<p>—</p>';

  // Галерея фото
  const galWrap = document.getElementById('sheet-gallery-wrap');
  const gal = document.getElementById('sheet-gallery');
  if(d.images && d.images.length){
    gal.innerHTML = d.images.map(src=>`<img src="${src}" alt="${d.name||''}" onclick="openLightbox('${src}')" onerror="this.style.display='none'">`).join('');
    galWrap.style.display = 'block';
  } else {
    gal.innerHTML = '';
    galWrap.style.display = 'none';
  }

  // Предупреждение
  const noteWrap = document.getElementById('sheet-note-wrap');
  if(d.note){
    document.getElementById('sheet-note').textContent = d.note;
    noteWrap.style.display = 'block';
  } else {
    noteWrap.style.display = 'none';
  }

  document.getElementById('info-sheet').classList.add('open');
  // Кнопка «Показать на карте» нужна только когда открыли из списка
  // (маршрут ещё не нарисован). При клике по самой карте кнопка не нужна.
  document.getElementById('sheet-actions').style.display = withRoute ? 'none' : 'flex';
  if(withRoute){
    drawRoute(id);
  } else {
    document.getElementById('route-path').classList.remove('visible');
  }
}
function closeSheet(){
  document.getElementById('info-sheet').classList.remove('open');
}
function openLightbox(src){
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
}

/* ---------------- построение маршрута ---------------- */
function drawRoute(id){
  const path = document.getElementById('route-path');
  const endMarker = document.getElementById('route-end');
  const custom = (ROOM_DATA[id] && ROOM_DATA[id].path) || (window.ROOM_PATHS && window.ROOM_PATHS[id]) || (window.__ROOM_PATHS && window.__ROOM_PATHS[id]);
  let pts;
  if(custom && custom.length){
    pts = custom;
  } else {
    const c = centers[id];
    // простой маршрут "уголком": сначала по горизонтали, потом по вертикали
    pts = [[ENTRANCE.x, ENTRANCE.y], [c.x, ENTRANCE.y], [c.x, c.y]];
  }
  const d = pts.map((p,i)=> (i===0?'M':'L') + p[0] + ' ' + p[1]).join(' ');
  path.setAttribute('d', d);
  path.classList.add('visible');
  const last = pts[pts.length - 1];
  if(last && last.length === 2){
    endMarker.setAttribute('cx', last[0]);
    endMarker.setAttribute('cy', last[1]);
    endMarker.classList.add('visible');
  } else {
    endMarker.classList.remove('visible');
  }
}

function closeSheet(){
  document.getElementById('info-sheet').classList.remove('open');
}

/* ---------------- переключение видов ---------------- */
function setView(view){
  document.getElementById('map-view').classList.toggle('active', view==='map');
  document.getElementById('list-view').classList.toggle('active', view==='list');
  document.getElementById('btn-view-map').classList.toggle('active', view==='map');
  document.getElementById('btn-view-list').classList.toggle('active', view==='list');
  document.getElementById('search-wrap').style.display = view==='list' ? 'block' : 'none';
  if(view==='list') renderList();
}
// Кнопка «Показать на карте» в панели: переключает на карту, центрирует
// и ТОЛЬКО ТЕПЕРЬ рисует маршрут (он ещё не был показан из списка)
function focusRoomOnMap(id){
  if(!id) return;
  setView('map');
  centerOnRoom(id);
  drawRoute(id);
  document.getElementById('sheet-actions').style.display = 'none';
}

/* ---------------- список кабинетов ---------------- */
function renderList(){
  const q = (document.getElementById('search-input').value || '').trim().toLowerCase();
  const wrap = document.getElementById('list-view');
  wrap.innerHTML = '';
  const ids = Object.keys(ROOM_DATA).sort();
  let shown = 0;
  ids.forEach(id=>{
    const base = ROOM_DATA[id] || {};
    const details = (window.ROOM_DETAILS && window.ROOM_DETAILS[id]) ? window.ROOM_DETAILS[id] : {};
    const d = Object.assign({}, base, details);
    const num = id.replace('room-','');
    const hay = (num + ' ' + (d.name||'')).toLowerCase();
    if(q && !hay.includes(q)) return;
    shown++;
    const card = document.createElement('div');
    card.className = 'room-card';
    card.innerHTML = `<div class="badge"></div>
      <div class="txt"><strong>${d.name || 'Кабинет ' + num}</strong><span>${((Array.isArray(d.desc)?d.desc[0]:d.desc)||'').slice(0,60)}</span></div>`;
    card.addEventListener('click', ()=>{ showRoomInfo(id, false); });
    wrap.appendChild(card);
  });
  if(shown===0){
    wrap.innerHTML = '<div class="empty-state">Ничего не найдено. Попробуйте другой запрос.</div>';
  }
}

/* ---------------- zoom / pan карты ---------------- */
const canvas = document.getElementById('map-canvas');
const transformEl = document.getElementById('mapGroup');
let scale = 1, tx = 0, ty = 0;
const BASE_W = 3614; // ширина SVG viewBox
const BASE_H = 1785; // высота SVG viewBox

function applyTransform(){
  transformEl.setAttribute('transform', `translate(${tx}, ${ty}) scale(${scale})`);
}
function clampScale(s){ return Math.min(4, Math.max(0.4, s)); }

function initView(){
  scale = 1;
  tx = 0;
  ty = 0;
  applyTransform();
}
function resetView(){ initView(); }
function zoomBy(factor, cx, cy){
  const rect = canvas.getBoundingClientRect();
  const px = cx!==undefined ? cx : rect.width/2;
  const py = cy!==undefined ? cy : rect.height/2;
  const newScale = clampScale(scale*factor);
  const ratio = newScale/scale;
  tx = px - (px - tx)*ratio;
  ty = py - (py - ty)*ratio;
  scale = newScale;
  applyTransform();
}

// pointer-based pan + распознавание тапа по кабинету
let dragging=false, lastX=0, lastY=0, downX=0, downY=0, moved=false;
const TAP_THRESHOLD = 8; // px — если сдвиг меньше, считаем это тапом, а не перетаскиванием

canvas.addEventListener('pointerdown', e=>{
  e.preventDefault();
  dragging=true; moved=false;
  canvas.classList.add('dragging');
  lastX=e.clientX; lastY=e.clientY;
  downX=e.clientX; downY=e.clientY;
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', e=>{
  if(!dragging) return;
  e.preventDefault();
  if(Math.hypot(e.clientX-downX, e.clientY-downY) > TAP_THRESHOLD) moved = true;
  tx += e.clientX-lastX; ty += e.clientY-lastY;
  lastX=e.clientX; lastY=e.clientY;
  applyTransform();
});
canvas.addEventListener('pointerup', e=>{
  dragging=false;
  canvas.classList.remove('dragging');
  canvas.releasePointerCapture(e.pointerId);
  if(!moved){
    handleTap(e.clientX, e.clientY);
  }
});
canvas.addEventListener('pointercancel', e=>{
  dragging=false;
  canvas.classList.remove('dragging');
  if (e.pointerId) canvas.releasePointerCapture(e.pointerId);
});

function handleTap(clientX, clientY){
  const el = document.elementFromPoint(clientX, clientY);
  const roomEl = el && el.closest ? el.closest('.room') : null;
  if(roomEl && roomEl.id){
    showRoomInfo(roomEl.id, true);
  }
}

// wheel zoom (desktop)
canvas.addEventListener('wheel', e=>{
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  zoomBy(e.deltaY<0 ? 1.12 : 1/1.12, e.clientX-rect.left, e.clientY-rect.top);
}, {passive:false});

// pinch zoom (mobile)
let pinchStartDist=null, pinchStartScale=1;
canvas.addEventListener('touchstart', e=>{
  if(e.touches.length===2){
    dragging=false;
    pinchStartDist = touchDist(e.touches);
    pinchStartScale = scale;
  }
}, {passive:true});
canvas.addEventListener('touchmove', e=>{
  if(e.touches.length===2){
    e.preventDefault();
    const d = touchDist(e.touches);
    const rect = canvas.getBoundingClientRect();
    const mid = {
      x:(e.touches[0].clientX+e.touches[1].clientX)/2-rect.left,
      y:(e.touches[0].clientY+e.touches[1].clientY)/2-rect.top
    };
    const targetScale = clampScale(pinchStartScale * (d/pinchStartDist));
    zoomBy(targetScale/scale, mid.x, mid.y);
  }
}, {passive:false});
function touchDist(t){ return Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY); }

function centerOnRoom(id){
  const rect = canvas.getBoundingClientRect();
  const c = centers[id];
  scale = clampScale(2.1);
  tx = rect.width/2 - c.x * scale;
  ty = rect.height/2 - c.y * scale;
  applyTransform();
}

window.addEventListener('resize', initView);
window.addEventListener('load', initView);
initView();
</script>
